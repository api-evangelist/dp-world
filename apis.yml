description: >-
  DP World is an Emirati global logistics company that specializes in port operations,
  maritime services, and supply chain solutions. It manages and operates marine and
  inland terminals across more than 40 countries and operates a portfolio of digital
  platforms - including the CARGOES suite (Flow, Runner, TOS+, PCS, Customs), Searates,
  and the Digital Freight Alliance - that expose APIs and integrations for shipment
  visibility, freight pricing, terminal operations, and trade workflows.
